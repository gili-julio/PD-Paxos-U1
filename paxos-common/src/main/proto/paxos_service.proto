syntax = "proto3";

package br.ufrn.imd.pd;

option java_package = "br.ufrn.imd.pd.common.proto";
option java_multiple_files = true;

message GenericRequest {
    string method = 1;
    string path = 2;
    map<string, string> headers = 3;
    string body = 4;
}

message GenericResponse {
    int32 status_code = 1;
    string method = 2;
    map<string, string> headers = 3;
    string body = 4;
}

service PaxosNodeService {
    rpc Exchange(GenericRequest) returns (GenericResponse);
}
